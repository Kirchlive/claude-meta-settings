# MetaMCP reverse proxy (running without Docker).
#
# Include this from the nginx http{} block, e.g. (Homebrew nginx ships an
# `include servers/*;` in its http{} — symlink this file there):
#   include /path/to/metamcp/deploy/nginx-metamcp.conf;
#
# HTTP only. Add TLS (e.g. certbot) only if this host is publicly reachable via a
# domain name. For a purely local host you can skip nginx entirely and hit the
# frontend on http://localhost:12008 directly — this proxy is for a clean :80 / domain entry.

server {
    listen       80;
    server_name  localhost;

    # SSE / streamable-HTTP MCP traffic needs long timeouts and no buffering.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_buffering     off;

    location / {
        proxy_pass http://127.0.0.1:12008;
    }
}
